<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803d" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      try {
        var t = localStorage.getItem('tennisturnier:theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    </script>
    <meta
      name="description"
      content="Browserbasierte App zum Planen kleiner Tennisturniere — Spielplan, Rundentimer, Gruppen, KO-Bracket, Siegerehrung. Offlinefähig, ohne Anmeldung."
    />
    <meta property="og:title" content="Tennisturnier-Planer" />
    <meta
      property="og:description"
      content="Spielplan-Generator für Tennisturniere — Mixed, Damen-/Herren-Doppel, freies Doppel, Gruppen + KO."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <title>Tennisturnier-Planer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
