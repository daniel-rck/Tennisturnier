name = "tennisturnier"
main = "./worker/index.ts"
compatibility_date = "2024-12-30"

# Static SPA from Vite — served when no API route matches.
# `single-page-application` falls back to index.html for unmatched paths.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# KV-Binding für Live-Sync. Variable name `TOURNAMENTS` ist fest verdrahtet
# (`env.TOURNAMENTS` in functions/_shared/kv.ts) — bitte nicht umbenennen.
# Resource: KV-Namespace `tennisturnier-tournaments` (siehe SETUP.md).
[[kv_namespaces]]
binding = "TOURNAMENTS"
id = "0383b364e95a41b8b17194021eed3416"
