name = "tennisturnier"
main = "./worker/index.ts"
compatibility_date = "2024-12-30"

# Static SPA from Vite — served when no API route matches.
# `single-page-application` falls back to index.html for unmatched paths.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# KV-Binding für Live-Sync.
#
# Variable name `TOURNAMENTS` ist fest verdrahtet (`env.TOURNAMENTS` in
# functions/_shared/kv.ts) — bitte nicht umbenennen. `id` und `preview_id`
# kommen aus `wrangler kv namespace create tennisturnier-tournaments` bzw.
# `… --preview`. Detailanleitung in SETUP.md.
#
# Solange dieser Block auskommentiert ist, läuft der Deploy auch ohne KV
# durch — die App liefert dann beim Sync-Versuch eine 503 mit klarem
# Hinweistext. Sobald du die IDs hast: einfach unten einkommentieren und
# pushen.
#
# [[kv_namespaces]]
# binding = "TOURNAMENTS"
# id = "<production-id>"
# preview_id = "<preview-id>"
