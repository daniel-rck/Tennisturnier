name = "tennisturnier"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

# Build the SPA before deploy (used by `wrangler dev` and `wrangler deploy`).
# Workers Builds (CI) uses the build command configured in the dashboard,
# but having this also here keeps local dev consistent.
[build]
command = "npm ci --legacy-peer-deps && npm run build"

# Static assets (Vite output) — served by the runtime when no API route matches.
# `not_found_handling = "single-page-application"` makes deep-links fall back to index.html.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# KV namespace binding for live-sync snapshots is configured in the
# Cloudflare dashboard (Worker → Settings → Bindings → Add → KV namespace,
# variable name `TOURNAMENTS`). It is intentionally NOT declared here so
# the first deploy can succeed before the namespace exists.
#
# Once the binding is set in the dashboard, deploys keep it automatically.
# Alternatively you may pin it here after running:
#   npx wrangler kv namespace create TOURNAMENTS
#   npx wrangler kv namespace create TOURNAMENTS --preview
# Then add (and commit) the IDs:
#
# [[kv_namespaces]]
# binding = "TOURNAMENTS"
# id = "<production-id>"
# preview_id = "<preview-id>"
